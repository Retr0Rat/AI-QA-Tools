name: ETL — Process & Upload Course Data

on:
  push:
    branches: [main, master]
    paths:
      - 'data/courses/**'
      - 'etl/**'
  workflow_dispatch:  # allow manual runs from the GitHub UI

jobs:
  process-and-upload:
    name: Parse markdown → JSON → GCS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt

      - name: Install ETL dependencies
        run: pip install -r etl/requirements.txt

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Run ETL
        env:
          GCP_BUCKET_NAME: ${{ secrets.GCP_BUCKET_NAME }}
        run: python etl/process.py
